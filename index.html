<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tele Tudo</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffb6c1;
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #000;
      text-align: center;
    }

    .topo {
      width: 100%;
      display: block;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px 40px;
      box-sizing: border-box;
    }

    .botao-imagem {
      width: 100%;
      max-width: 640px;
      display: block;
      margin: 10px auto 25px auto;
    }

    .botao-imagem img {
      width: 100%;
      display: block;
    }

    .aviso {
      font-weight: bold;
      font-size: 14px;
      line-height: 1.5;
      margin: 15px 0 20px;
    }
  </style>
</head>
<body>

  <img src="topo01.png" alt="Tele Tudo" class="topo" />

  <div class="container">
    <div class="botao-imagem">
      <a href="https://t.me/+YTHUpQBnrfUxMWFh" target="_blank">
        <img src="botao01.png" alt="Entrar no Telegram">
      </a>
    </div>

    <p class="aviso">
      🚨Para acessar o grupo com as mídias deve ter instalado no seu telefone o Telegram!
    </p>
  </div>

</body>
</html>
